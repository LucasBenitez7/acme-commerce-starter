name: CI

on:
  pull_request:
    branches: [development, main]
  push:
    branches: [main, development]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Checks ───────────────────────────────────────────────────────────────
  checks:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  # ─── 2. Unit & Integration Tests ───────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: checks

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acme_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/acme_test
      AUTH_SECRET: test-secret-ci
      AUTH_GITHUB_ID: mock
      AUTH_GITHUB_SECRET: mock
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      APP_ENV: test
      NEXT_PUBLIC_DEFAULT_CURRENCY: EUR
      CRON_SECRET: test-cron-secret
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_mock
      STRIPE_SECRET_KEY: sk_test_mock
      STRIPE_WEBHOOK_SECRET: whsec_mock
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: mock
      NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: mock
      NEXT_PUBLIC_CLOUDINARY_API_KEY: mock
      CLOUDINARY_API_KEY: mock
      CLOUDINARY_API_SECRET: mock
      RESEND_API_KEY: re_mock
      EMAIL_FROM: test@test.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run DB migrations on test DB
        run: pnpm prisma migrate deploy

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ─── 3. E2E (solo en push a main/development, no en cada PR) ───────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acme_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/acme_test
      AUTH_SECRET: test-secret-ci
      AUTH_GITHUB_ID: mock
      AUTH_GITHUB_SECRET: mock
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      APP_ENV: test
      NEXT_PUBLIC_DEFAULT_CURRENCY: EUR
      CRON_SECRET: test-cron-secret
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
      NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}
      NEXT_PUBLIC_CLOUDINARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_API_KEY }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: test@test.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Run DB migrations + seed
        run: |
          pnpm prisma migrate deploy
          pnpm db:seed

      - name: Build Next.js
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
