services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acme_test
    ports:
      - "5434:5432"
    # Sin volumen: cada vez que levanta empieza limpia
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d acme_test"]
      interval: 5s
      timeout: 5s
      retries: 20